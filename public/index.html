<!DOCTYPE html>
<html>
	<head>
		<title>Obj to BABFT Converter</title>
		<link rel="stylesheet" href="reset.css" />
		<link rel="stylesheet" href="style.css" />
		<script type="importmap">
		{
			"imports": {
				"three": "/three/build/three.module.js",
				"three/addons/": "/three/examples/jsm/"
			}
		}
		</script>
	</head>
	<body>
		<div id="header"> <!-- header -->
			<span name="title">
				<span class="code font-mono">.obj</span>
				<span class="">to</span>
				<span class="code font-mono">BABFT</span>
				<span class="">Converter</span>
			</span>
			<div>
				<a href="#load" class="btn">load</a>
			</div>
		</div>
		<div id="preview"></div>
		<div id="controls">
			<div name="wbar">
				<span>controls</span>
				<button onclick="this.innerText = (this.innerText === '-' ? (controlsContent.style.display='none') : !(controlsContent.style.display='block'))? '+':'-'">-</button>
			</div>
			<ul id="controlsContent" style="padding: 10px 10px;">
				<li>
					<button class="btn" onclick="funcs.process()">process</button>
				</li>
				<li>
					<a href="#code" class="btn" onclick="funcs.codegen()">codegen</a>
				</li>
			</ul>
		</div>

		<div id="load" class="modal">
			<div name="header">
				<span>load a 3d model</span>
				<a href="#" class="btn">&times;</a>
			</div>
			<div>
				<span>select an <span class="code">obj</span> file to load</span>
				<br />
				<input type="file" id="loadmodel" />
			</div>
		</div>
		<div id="code" class="modal">
			<div name="header">
				<span>generated code</span>
				<a href="#" class="btn">&times;</a>
			</div>
			<div>
				<textarea style="cursor: text; width: 400px; height: 400px; background-color: #181818; color: #fff; resize: none;" disabled id="codegenOutput"></textarea>
				<br />
				<button onclick="navigator.clipboard.writeText(codegenOutput.textContent)" class="btn">copy</button>
			</div>
		</div>
		<script src="https://livejs.com/live.js"></script>
		<script src="script.js" type="module"></script>
	</body>
</html>
